llm:
  provider: deepseek
  model: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  max_tokens: 4096
  temperature: 0.3

quota:
  daily_limit: 50
  admin_password: ${ADMIN_PASS:-admin123}

data:
  providers:
    - akshare

ui:
  default: web
  cli:
    show_stock_panel: true
  web:
    port: 8501
    theme: light

memory:
  history_limit: 200
  db_path: data/stockbot.db

qlib:
  data_dir: ~/.qlib/qlib_data/cn_data
  model_dir: data/qlib_model
  instruments: csi300
  enabled: true

index:
  default_code: "000001"
  supported_codes:
    - "000001"
    - "399001"
    - "399006"

index_model:
  model_dir: data/index_model
  short_term_horizon: 3
  mid_term_horizon: 20

auth:
  open_registration: true
